name: CarryOn CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "ruff>=0.15,<1.0"
      - name: Lint
        working-directory: backend
        run: |
          ruff check .
          ruff format --check .

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: frontend
        run: yarn install
      - name: Build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: https://carryon.us
          CI: false
        run: yarn build
