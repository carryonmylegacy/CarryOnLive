name: CarryOn CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - name: Lint
        working-directory: backend
        run: |
          ruff check .
          ruff format --check .

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: test_database
      JWT_SECRET: ci-test-secret-key-not-for-production
      ENCRYPTION_KEY: ci-test-encryption-key-32chars!!
      CORS_ORIGINS: "*"
      STRIPE_API_KEY: ""
      XAI_API_KEY: ""
      RESEND_API_KEY: ""
      TWILIO_ACCOUNT_SID: ""
      TWILIO_AUTH_TOKEN: ""
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
      S3_BUCKET_NAME: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
      - name: Start server
        working-directory: backend
        run: |
          uvicorn server:app --host 0.0.0.0 --port 8001 &
          sleep 8
          curl -f http://localhost:8001/api/health || (cat /tmp/server.log 2>/dev/null; exit 1)
      - name: Run tests
        working-directory: backend
        env:
          REACT_APP_BACKEND_URL: http://localhost:8001
        run: pytest tests/test_comprehensive_suite.py -v --tb=short

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend
        run: yarn install
      - name: Build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: https://carryon.us
          CI: false
        run: yarn build
