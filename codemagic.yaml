workflows:
  live-update:
    name: CarryOn Live Update
    max_build_duration: 15
    instance_type: linux_x2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    environment:
      vars:
        REACT_APP_BACKEND_URL: https://carryon-api-production.up.railway.app
        REACT_APP_GOOGLE_PLACES_API_KEY: AIzaSyDHf5S59xv3uTH9YE3I97EDkEeCJFTZ1U4
      node: 20
    cache:
      cache_paths:
        - $CM_BUILD_DIR/frontend/node_modules
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          yarn install --frozen-lockfile || yarn install
      - name: Build web app
        script: |
          cd frontend
          yarn build
      - name: Deploy live update via Capgo
        script: |
          cd frontend
          npx @capgo/cli bundle upload --channel production

  ios-build:
    name: CarryOn iOS Build
    max_build_duration: 45
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: CarryOn-ASC-Key
    environment:
      groups:
        - signing
      vars:
        REACT_APP_BACKEND_URL: https://carryon-api-production.up.railway.app
        REACT_APP_GOOGLE_PLACES_API_KEY: AIzaSyDHf5S59xv3uTH9YE3I97EDkEeCJFTZ1U4
        BUNDLE_ID: us.carryon.app
        XCODE_WORKSPACE: frontend/ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: 20
      xcode: 26.3
      cocoapods: default
    cache:
      cache_paths:
        - $CM_BUILD_DIR/frontend/node_modules
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/frontend/ios/App/Pods
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          yarn install --frozen-lockfile || yarn install
      - name: Build web app
        script: |
          cd frontend
          GENERATE_SOURCEMAP=false yarn build
      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          timeout 300 pod install --repo-update || pod install
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:frontend/ios/signing_key.pem \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Set build number
        script: |
          cd frontend/ios/App
          BUILD_NUMBER=$(($(date +%s) / 60))
          echo "Setting build number to $BUILD_NUMBER"
          agvtool new-version -all $BUILD_NUMBER
      - name: Clean derived data
        script: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
      - name: Build iOS app
        script: |
          set -e
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config Release \
            --archive-flags="-destination 'generic/platform=iOS' COMPILER_INDEX_STORE_ENABLE=NO"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $CM_BUILD_DIR/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-build:
    name: CarryOn Android Build
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      android_signing:
        - carryon_keystore
      vars:
        REACT_APP_BACKEND_URL: https://carryon-api-production.up.railway.app
        REACT_APP_GOOGLE_PLACES_API_KEY: AIzaSyDHf5S59xv3uTH9YE3I97EDkEeCJFTZ1U4
      node: 20
      java: 17
    cache:
      cache_paths:
        - $CM_BUILD_DIR/frontend/node_modules
        - $HOME/.gradle/caches
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          yarn install --frozen-lockfile || yarn install
      - name: Build web app
        script: |
          cd frontend
          GENERATE_SOURCEMAP=false yarn build
      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync android
      - name: Build Android APK & AAB
        script: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleRelease
          ./gradlew bundleRelease
    artifacts:
      - frontend/android/app/build/outputs/**/*.apk
      - frontend/android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
