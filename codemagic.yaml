workflows:
  live-update:
    name: CarryOn Live Update
    max_build_duration: 15
    instance_type: linux_x2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    environment:
      vars:
        REACT_APP_BACKEND_URL: https://carryon.us
      node: 20
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          yarn install --frozen-lockfile
      - name: Build web app
        script: |
          cd frontend
          yarn build
      - name: Deploy live update via Capgo
        script: |
          cd frontend
          npx @capgo/cli bundle upload --channel production

  ios-build:
    name: CarryOn iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: CarryOn-ASC-Key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.carryon.app
      vars:
        REACT_APP_BACKEND_URL: https://carryon.us
        XCODE_SCHEME: App
        XCODE_WORKSPACE: frontend/ios/App/App.xcworkspace
        APPLE_TEAM_ID: 2KL2Z3CXB2
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          yarn install --frozen-lockfile
      - name: Build web app
        script: |
          cd frontend
          yarn build
      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install
      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync ios
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Set build number
        script: |
          cd frontend/ios/App
          agvtool new-version -all $(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_CONNECT_APP_ID" || echo 0) + 1))
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - frontend/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - CarryOn Testers

  android-build:
    name: CarryOn Android Build
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      android_signing:
        - carryon_keystore
      vars:
        REACT_APP_BACKEND_URL: https://carryon.us
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          yarn install --frozen-lockfile
      - name: Build web app
        script: |
          cd frontend
          yarn build
      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync android
      - name: Build Android APK & AAB
        script: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleRelease
          ./gradlew bundleRelease
    artifacts:
      - frontend/android/app/build/outputs/**/*.apk
      - frontend/android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
