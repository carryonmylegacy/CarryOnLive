# Render Blueprint - deploy CarryOn™ with one click
# https://render.com/docs/infrastructure-as-code

services:
  # Backend API
  - type: web
    name: carryon-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false  # Set manually (MongoDB Atlas connection string)
      - key: DB_NAME
        value: carryon_db
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false  # Set to your frontend URL (e.g., https://carryon-web.onrender.com)
      - key: RESEND_API_KEY
        sync: false
      - key: SENDER_EMAIL
        value: noreply@carryon.us
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_CLAIMS_EMAIL
        value: mailto:support@carryon.us

  # Frontend (static site)
  - type: web
    name: carryon-web
    runtime: static
    buildCommand: cd frontend && yarn install && chmod +x build-prod.sh && bash build-prod.sh
    staticPublishPath: ./frontend/build
    pullRequestPreviewsEnabled: true
    headers:
      - path: /static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /sw-push.js
        name: Cache-Control
        value: no-store
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false  # Set to your backend URL (e.g., https://carryon-api.onrender.com)
      - key: REACT_APP_VAPID_PUBLIC_KEY
        sync: false
      - key: REACT_APP_STRIPE_PUBLISHABLE_KEY
        sync: false  # Set to your Stripe publishable key (pk_live_... or pk_test_...)
      - key: CI
        value: "false"
